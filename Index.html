<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Tanvi Dighe | Portfolio</title>
    <link rel='stylesheet' href='https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;500;600&display=swap'>
    <link rel='stylesheet' href='Style.css'>
</head>
<body>

    <div class='aesthetic-bg'></div>

    <header class='hero-header'>
        <h1 class='main-name'>Tanvi Dighe</h1>
        <div class='role-container'>
            <span id='role-text'></span><span class='cursor'>|</span>
        </div>
    </header>

    <main class='hero-layout'>
        <div class='side-image outer-left'>
            <img src='https://images.unsplash.com/photo-1517694712202-14dd9538aa97?q=80&w=600' alt='Aesthetic Workspace'>
        </div>

        <div class='center-photo'>
            <img src='MyPhoto.jpeg' alt='Tanvi Dighe'>
        </div>

        <div class='side-image outer-right'>
            <img src='https://images.unsplash.com/photo-1515378791036-0648a3ef77b2?q=80&w=600' alt='Aesthetic Coding'>
        </div>
    </main>

    <section class='education-page'>
        <h2 class='section-title'>Academic Journey</h2>
        
        <div class='timeline-container'>
            <div class='timeline-item left'>
                <div class='milestone-card'>
                    <span class='year'>Secondary Education</span>
                    <h3>10th Grade | 91%</h3>
                    <p>Atma Malik International School</p>
                </div>
            </div>

            <div class='timeline-item right'>
                <div class='milestone-card'>
                    <span class='year'>Higher Secondary</span>
                    <h3>12th Grade | 79%</h3>
                    <p>Atma Malik International School</p>
                </div>
            </div>

            <div class='timeline-item left'>
                <div class='milestone-card'>
                    <span class='year'>June 2025</span>
                    <h3>BE Computer Science | 7.99 CGPA</h3>
                    <p>Savitribai Phule Pune University</p>
                    
                    <div class='semester-highlights'>
                        <div class='sem-box'>
                            <span class='sem-label'>7th Sem</span>
                            <span class='sem-value'>9.70 SGPA</span>
                        </div>
                        <div class='sem-box'>
                            <span class='sem-label'>8th Sem</span>
                            <span class='sem-value'>9.50 SGPA</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div class='real-flower-corner'>
        <img src='https://pngimg.com/d/tulip_PNG8984.png' alt='Realistic Tulip' class='real-tulip'>
        <img src='https://pngimg.com/d/sunflower_PNG102143.png' alt='Realistic Sunflower' class='real-sunflower'>
    </div>

    <script src='script.js'></script>
</body>
</html>
